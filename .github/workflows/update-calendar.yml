name: Update consolidated calendar

on:
  schedule:
    # Runs Monday and Thursday at 11:00 UTC (~6-7am America/Indiana/Indianapolis
    # depending on DST). Edit the two cron lines to change days/times.
    - cron: "0 11 * * 1"
    - cron: "0 11 * * 4"
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: mkdir -p docs && python build_calendar.py

      - name: Commit updated calendar
        run: |
          git config user.name "calendar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/calendar.ics
          git diff --quiet --cached || git commit -m "Update calendar $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
